name: V2ray URL Processor (Safe & Clean)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2,14 * * *'  # 每天凌晨2点、下午2点各一次，降低频率

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0          # 拉取完整历史，确保能正常 rebase
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run Python script
      run: python main.py

    - name: Check if data actually changed
      id: check
      run: |
        git add data/V2.txt
        if git diff --cached --quiet; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "Data unchanged, skip commit."
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Safe commit and push
      if: steps.check.outputs.changed == 'true'
      run: |
        git config --global user.name "acymz"
        git config --global user.email "cymz6@hotmail.com"
        
        # 先拉取远程最新，避免强制覆盖（解决 force push 风险）
        git pull origin ${{ github.ref_name }} --rebase || true
        
        # 正常提交，不强制
        git commit -m "Update V2.txt - $(date +'%Y-%m-%d %H:%M')"
        git push origin ${{ github.ref_name }}
